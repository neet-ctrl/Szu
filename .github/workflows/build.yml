name: Build Debug APK

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true"

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        working-directory: android-control-center
        run: chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
            android-control-center/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('android-control-center/**/*.gradle*', 'android-control-center/**/gradle-wrapper.properties', 'android-control-center/**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Debug APK
        working-directory: android-control-center
        run: |
          echo "Building DEBUG only — no signed APK, no release APK"
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            --info \
            -Pandroid.injected.testOnly=false
        env:
          JAVA_OPTS: "-Xmx6g -XX:MaxMetaspaceSize=1g"
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      - name: Verify APK exists
        working-directory: android-control-center
        run: |
          echo "=== Built APK Files ==="
          ls -lh app/build/outputs/apk/debug/*.apk
          echo ""
          echo "Build #${{ github.run_number }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Triggered by: ${{ github.actor }}"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ACCU-debug-build${{ github.run_number }}
          path: android-control-center/app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: error

      - name: Upload Build Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-report-${{ github.run_number }}
          path: android-control-center/app/build/reports/
          retention-days: 7

      - name: APK Build Summary
        run: |
          echo "## Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Build # | ${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| APK | ACCU-debug-build${{ github.run_number }} artifact |" >> $GITHUB_STEP_SUMMARY
